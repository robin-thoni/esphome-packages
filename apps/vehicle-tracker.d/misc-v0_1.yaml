modem:
  on_connect:
    then:
      - script.execute: script_update_public_ip
  on_disconnect:
    then:
      - script.execute: script_update_public_ip

text_sensor:
  - platform: template
    id: public_ip
    entity_category: "diagnostic"

script:
  - id: script_update_public_ip
    then:
      - http_request.get:
          url: https://ifconfig.co/json
          capture_response: true
          on_response:
            then:
              - logger.log:
                  format: "IP details: %s"
                  args:
                    - body.c_str()
              - if:
                  condition:
                      lambda: return response->status_code == 200;
                  then:
                      - lambda: |-
                          json::parse_json(body, [](JsonObject root) -> bool {
                              if (root["ip"]) {
                                  id(public_ip).publish_state(root["ip"].as<const char*>());
                                  return true;
                              }
                              else {
                                id(public_ip).publish_state("unknown");
                                return false;
                              }
                          });
          on_error:
            then:
              - lambda: |
                  id(public_ip).publish_state("none");
